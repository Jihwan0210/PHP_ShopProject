	{
		if (form2.opts1.value==0) {
			alert("옵션1을 선택하십시요.");
			form2.opts1.focus();
			return;
		}
		if (form2.opts2.value==0) {
			alert("옵션2를 선택하십시요.");
			form2.opts2.focus();
			return;
		}
		if (!form2.num.value) {
			alert("수량을 입력하십시요.");
			form2.num.focus();
			return;
		}
		if (str == "D") {
			form2.action = "order.html";
			form2.kind.value = "order";
			form2.submit();
		}
		else {
			form2.action = "cart_edit.html";
			form2.submit();
		}
	}
</script>
